name: 練馬区施設 空き状況チェック

# ==============================================================
# このファイルは「いつ・どうやって check_availability.py を実行するか」を
# GitHubに指示するファイルです。中身を編集する必要は基本的にありません。
# ==============================================================

on:
  schedule:
    # 30分ごとに実行（UTC基準の指定なので日本時間とは9時間ずれます）
    # GitHub Actionsのスケジュールは「だいたい30分ごと」であり、
    # 混雑時は数分〜十数分ずれることがあります。ご了承ください。
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # これがあると、GitHubの画面から「今すぐ手動で実行」できるようになります。
    # 最初の動作確認はこの手動実行を使います。

# 状態ファイル(state/availability.json)をリポジトリにコミットし直すため、
# 書き込み権限を許可します。
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 必要なライブラリをインストール
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 空き状況をチェック
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python check_availability.py

      - name: 状態ファイル・デバッグ画像を保存(コミット)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state debug
          git diff --quiet --cached || git commit -m "空き状況チェック結果を更新 [skip ci]"
          git push
